name: O2OEG Clean Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # اذهب لمسار المشروع
            cd /var/www/o2oeg
            
            # تطهير كامل للملفات وجلب النسخة النظيفة
            git fetch --all
            git reset --hard origin/main
            git clean -fd
            
            # تحديث الباك إند مع إعادة بناء قاعدة البيانات وزراعة البيانات الأساسية
            cd backend
            composer install --no-dev --optimize-autoloader
            php artisan migrate:fresh --seed --force
            php artisan optimize
            
            # تحديث الفرونت إند (Build Clean)
            cd ../frontend
            rm -rf dist
            npm install
            npm run build
            
            echo "🚀 O2OEG Platform has been REBORN and is now LIVE!"
