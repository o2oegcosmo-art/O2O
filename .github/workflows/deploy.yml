name: O2OEG Clean Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Build Frontend Locally
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # محاولة تحديد المجلد الصحيح تلقائياً
            if [ -d "/var/www/o2oeg" ]; then
                ROOT="/var/www/o2oeg"
            elif [ -d "/var/www/u525164227" ]; then
                ROOT="/var/www/u525164227"
            else
                ROOT=$(pwd)
            fi
            
            cd $ROOT
            echo "Working in: $ROOT"
            
            # جلب الكود الجديد
            git fetch --all
            git reset --hard origin/main
            git clean -fd
            
            # تحديث الباك إند وتنظيف الكاش القاتل
            if [ -d "backend" ]; then
                cd backend
            fi
            
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan cache:clear
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan optimize:clear
            
            # العودة للمجلد الرئيسي وبناء الفرونت إند
            cd $ROOT/frontend
            npm install
            npm run build
            
            # نسخ الملفات لكل الأماكن المحتملة لضمان استعادة الموقع
            # 1. المجلد العام في الجذر
            mkdir -p $ROOT/public
            cp -r dist/* $ROOT/public/
            
            # 2. مجلد public داخل backend
            if [ -d "$ROOT/backend/public" ]; then
                cp -r dist/* $ROOT/backend/public/
            fi
            
            echo "🚀 O2OEG Platform has been REBORN and is now LIVE on $ROOT!"
