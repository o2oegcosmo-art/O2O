name: O2OEG Clean Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Build Frontend Locally
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # الدخول للمجلد الرئيسي
            cd /var/www/u525164227
            
            # جلب الكود الجديد
            git fetch --all
            git reset --hard origin/main
            git clean -fd
            
            # تحديث الباك إند (سواء كان في المجلد الرئيسي أو في مجلد backend)
            if [ -d "backend" ]; then
                cd backend
                composer install --no-dev --optimize-autoloader
                php artisan migrate --force
                php artisan optimize:clear
                cd ..
            else
                composer install --no-dev --optimize-autoloader
                php artisan migrate --force
                php artisan optimize:clear
            fi
            
            # تحديث وبناء الفرونت إند
            cd frontend
            npm install
            npm run build
            
            # الحل الجذري: نسخ الملفات إلى كافة المجلدات العامة المحتملة
            # 1. المجلد العام الرئيسي (المذكور في الخطأ)
            mkdir -p ../public
            cp -r dist/* ../public/
            
            # 2. مجلد public داخل backend (إذا وجد)
            if [ -d "../backend/public" ]; then
                cp -r dist/* ../backend/public/
            fi
            
            echo "🚀 O2OEG Platform has been REBORN and is now LIVE!"
